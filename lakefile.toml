name = "VeIR"
version = "0.1.0"
defaultTargets = ["veir-opt", "veir-interpret", "run-benchmarks", "Veir"]
testRunner = "UnitTest"
moreLeanArgs = ["--tstack=400000"]
moreServerArgs = ["--tstack=400000"]



[[lean_lib]]
name = "Veir"
root = "Veir"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4-nightly-testing"
rev = "nightly-testing-2026-05-07"

[[lean_lib]]
name = "UnitTest"
root = "UnitTest"

[[lean_exe]]
name = "veir-opt"
root = "VeirOpt"

[[lean_exe]]
name = "run-benchmarks"
root = "RunBenchmarks"

[[lean_exe]]
name = "veir-interpret"
root = "VeirInterpret"
