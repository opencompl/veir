name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git switch --orphan gh-pages
            git commit --allow-empty -m "Initialize gh-pages"
            git push origin gh-pages
            git checkout "$GITHUB_SHA"
          fi

      - name: Build the project
        uses: leanprover/lean-action@v1
        with:
          build-args: "--iofail"

      - name: Run benchmarks
        run: |
          chmod +x .github/scripts/run_benchmarks.sh
          .github/scripts/run_benchmarks.sh 1000 100

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: VeIR Benchmarks
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          alert-threshold: "110%"
          comment-on-alert: false
          fail-on-alert: ${{ github.event_name == 'pull_request' }}
          comment-always: ${{ github.event_name == 'pull_request' }}
          save-data-file: ${{ github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload benchmark results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json

  build-docs:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build docs
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: "docbuild"
          build-args: "Veir:docs"

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docbuild/.lake/build/doc/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [benchmark, build-docs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: docs-content

      - name: Merge docs into gh-pages (preserving dev/)
        run: |
          # Remove old docs but keep dev/ (benchmarks) and .git/
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'dev' ! -name 'docs-content' -exec rm -rf {} +
          # Copy fresh docs into root
          cp -r docs-content/* .
          rm -rf docs-content

      - name: Push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No docs changes to deploy" && exit 0
          git commit -m "Deploy docs for ${{ github.sha }}"
          git pull --rebase origin gh-pages
          git push origin gh-pages
