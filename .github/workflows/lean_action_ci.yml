name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the project
        uses: leanprover/lean-action@v1
        with:
          build-args: "--iofail"

      - name: Run unit tests
        uses: leanprover/lean-action@v1
        with:
          build-args: "--iofail"
          test: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install Python dependencies
        run: uv sync

      - name: Run filecheck tests
        run: uv run lit Test/ -v

  veir-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build veir
        uses: leanprover/lean-action@v1
        with:
          build-args: "--iofail"

      - name: Install LLVM tools
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y mlir-20-tools
          echo "/usr/lib/llvm-20/bin" >> $GITHUB_PATH

      - name: Verify LLVM tools
        run: |
          which mlir-opt && mlir-opt --version
          which mlir-translate && mlir-translate --version
          which lli && lli --version

      - name: Clone veir-tests
        uses: actions/checkout@v4
        with:
          repository: opencompl/veir-tests
          path: veir-tests

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Run veir-tests
        env:
          VEIR_DIR: ${{ github.workspace }}
          LLI: /usr/lib/llvm-20/bin/lli
          MLIR_OPT: /usr/lib/llvm-20/bin/mlir-opt
          MLIR_TRANSLATE: /usr/lib/llvm-20/bin/mlir-translate
        run: |
          cd veir-tests
          python3 scripts/convert.py tests/disjoint.mlir || true
          ./scripts/run-test.sh
